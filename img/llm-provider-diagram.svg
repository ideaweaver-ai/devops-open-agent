<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1200" height="640" viewBox="0 0 1200 640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0B1220"/><stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.35"/></filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#38BDF8"/></marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#A78BFA"/></marker>
  </defs>
  <rect width="1200" height="640" rx="24" fill="url(#bg)"/>
  <text x="600" y="42" text-anchor="middle" fill="#F8FAFC" font-family="system-ui,sans-serif" font-size="24" font-weight="700">DevOps Open Agent — LLM Provider Architecture</text>
  <text x="600" y="68" text-anchor="middle" fill="#94A3B8" font-family="system-ui,sans-serif" font-size="14">One platform · Shared LLM layer · Your choice of provider</text>

  <g filter="url(#shadow)">
    <rect x="70" y="155" width="220" height="250" rx="28" fill="#171B26" stroke="#334155" stroke-width="2"/>
    <image x="92" y="179" width="176" height="176" xlink:href="devops-open-agent-icon.png"/>
    <text x="180" y="348" text-anchor="middle" fill="#F8FAFC" font-family="system-ui,sans-serif" font-size="17" font-weight="700">DevOps Open Agent</text>
    <text x="180" y="368" text-anchor="middle" fill="#94A3B8" font-family="system-ui,sans-serif" font-size="11">K8s · AWS · Cost · PR Review</text>
  </g>

  <line x1="290" y1="280" x2="430" y2="280" stroke="#38BDF8" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <g filter="url(#shadow)">
    <rect x="430" y="200" width="240" height="130" rx="20" fill="#1E293B" stroke="#38BDF8" stroke-width="2"/>
    <text x="550" y="292" text-anchor="middle" fill="#38BDF8" font-family="system-ui,sans-serif" font-size="12" font-weight="700">SHARED AI LAYER</text>
    <text x="550" y="262" text-anchor="middle" fill="#F8FAFC" font-family="system-ui,sans-serif" font-size="24" font-weight="700">LLM</text>
    <text x="550" y="236" text-anchor="middle" fill="#CBD5E1" font-family="system-ui,sans-serif" font-size="11">Context · Prompts · RCA</text>
  </g>

  <line x1="670" y1="280" x2="760" y2="280" stroke="#A78BFA" stroke-width="3"/>
  <line x1="760" y1="185" x2="760" y2="500" stroke="#A78BFA" stroke-width="3"/>
  <line x1="760" y1="500" x2="860" y2="500" stroke="#A78BFA" stroke-width="3" marker-end="url(#arrowPurple)"/>
  <g filter="url(#shadow)">
    <rect x="860" y="450.0" width="260" height="100" rx="18" fill="#171B26" stroke="#334155" stroke-width="2"/>
    <circle cx="900" cy="500" r="22" fill="#21d3ed"/>
    <text x="900" y="504" text-anchor="middle" fill="#0B1220" font-family="system-ui,sans-serif" font-size="13" font-weight="700">O</text>
    <text x="990" y="512" text-anchor="middle" fill="#F8FAFC" font-family="system-ui,sans-serif" font-size="20" font-weight="700">Ollama</text>
    <text x="990" y="490" text-anchor="middle" fill="#94A3B8" font-family="system-ui,sans-serif" font-size="12">Local / self-hosted LLM</text>
  </g>
  <line x1="760" y1="395" x2="860" y2="395" stroke="#A78BFA" stroke-width="3" marker-end="url(#arrowPurple)"/>
  <g filter="url(#shadow)">
    <rect x="860" y="345.0" width="260" height="100" rx="18" fill="#171B26" stroke="#334155" stroke-width="2"/>
    <circle cx="900" cy="395" r="22" fill="#0fba82"/>
    <text x="900" y="399" text-anchor="middle" fill="#0B1220" font-family="system-ui,sans-serif" font-size="10" font-weight="700">AI</text>
    <text x="990" y="407" text-anchor="middle" fill="#F8FAFC" font-family="system-ui,sans-serif" font-size="20" font-weight="700">OpenAI</text>
    <text x="990" y="385" text-anchor="middle" fill="#94A3B8" font-family="system-ui,sans-serif" font-size="12">GPT-4o / GPT-4o-mini</text>
  </g>
  <line x1="760" y1="290" x2="860" y2="290" stroke="#A78BFA" stroke-width="3" marker-end="url(#arrowPurple)"/>
  <g filter="url(#shadow)">
    <rect x="860" y="240.0" width="260" height="100" rx="18" fill="#171B26" stroke="#334155" stroke-width="2"/>
    <circle cx="900" cy="290" r="22" fill="#f49e0a"/>
    <text x="900" y="294" text-anchor="middle" fill="#0B1220" font-family="system-ui,sans-serif" font-size="13" font-weight="700">A</text>
    <text x="990" y="302" text-anchor="middle" fill="#F8FAFC" font-family="system-ui,sans-serif" font-size="20" font-weight="700">Anthropic</text>
    <text x="990" y="280" text-anchor="middle" fill="#94A3B8" font-family="system-ui,sans-serif" font-size="12">Claude Sonnet / Opus</text>
  </g>
  <line x1="760" y1="185" x2="860" y2="185" stroke="#A78BFA" stroke-width="3" marker-end="url(#arrowPurple)"/>
  <g filter="url(#shadow)">
    <rect x="860" y="135.0" width="260" height="100" rx="18" fill="#171B26" stroke="#334155" stroke-width="2"/>
    <circle cx="900" cy="185" r="22" fill="#8c5bf4"/>
    <text x="900" y="189" text-anchor="middle" fill="#0B1220" font-family="system-ui,sans-serif" font-size="10" font-weight="700">OR</text>
    <text x="990" y="197" text-anchor="middle" fill="#F8FAFC" font-family="system-ui,sans-serif" font-size="20" font-weight="700">OpenRouter</text>
    <text x="990" y="175" text-anchor="middle" fill="#94A3B8" font-family="system-ui,sans-serif" font-size="12">100+ models · one API key</text>
  </g>

  <text x="600" y="618" text-anchor="middle" fill="#64748B" font-family="system-ui,sans-serif" font-size="12">Configure provider in backend/.env · All four agent modules use the same LLM layer</text>
