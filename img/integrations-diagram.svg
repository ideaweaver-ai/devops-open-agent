    <text x="540.0" y="242.0" text-anchor="middle" fill="#94A3B8" font-family="system-ui,sans-serif" font-size="11">PagerDuty · Slack</text>
  </g>

  <line x1="655" y1="322.0" x2="852" y2="390.0" stroke="#06AC38" stroke-width="3" marker-end="url(#arrowGreen)"/>
  <line x1="655" y1="238.0" x2="852" y2="170.0" stroke="#4A154B" stroke-width="3" marker-end="url(#arrowSlack)"/>

  <g filter="url(#shadow)">
