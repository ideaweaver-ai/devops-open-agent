    <circle cx="950.0" cy="408.0" r="28" fill="#06AC38"/>
    <text x="950.0" y="414.0" text-anchor="middle" fill="#F8FAFC" font-family="system-ui,sans-serif" font-size="18" font-weight="700">PD</text>
    <text x="950.0" y="357" text-anchor="middle" fill="#F8FAFC" font-family="system-ui,sans-serif" font-size="22" font-weight="700">PagerDuty</text>
    <text x="950.0" y="339" text-anchor="middle" fill="#94A3B8" font-family="system-ui,sans-serif" font-size="10">Incidents · On-call</text>
